name: Keep HuggingFace Spaces Awake

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping-huggingface:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Llasa 8B TTS (Speech-to-Speech)
        run: curl -s https://zouyunzouyunzouyun-llasa-8b-tts.hf.space > /dev/null
        
      - name: Ping Meta MMS Bengali (Text-to-Speech)
        run: curl -s https://dpc-mmstts.hf.space > /dev/null

      - name: Log Status
        run: echo "Pinged Hugging Face Spaces successfully to prevent cold starts."