name: Proxy Reaper + Source Hunter (Hetzner Verified Pipeline)

on:
  schedule:
    # Run every 4 hours to refresh the candidate pool
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      sample_size:
        description: 'Override MAX_SAMPLE (default 2000)'
        required: false
        default: '2000'

permissions:
  contents: write   # Required for git push of verified-proxies.json

jobs:
  harvest:
    name: Reap proxies + verify via Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # Auto-injected by GH Actions — bumps GitHub API from 60 to 1000 req/hr
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Node version (18+ required for native fetch)
        run: |
          node --version
          node -e "if (parseInt(process.version.slice(1)) < 18) { console.error('Node 18+ required'); process.exit(1); }"

      - name: Run Proxy Reaper + Source Hunter
        # continue-on-error: VPS may be in maintenance or proxy sources temporarily dry.
        # This keeps the workflow GREEN so email noise stops. Errors are logged.
        continue-on-error: true
        run: node scripts/proxy-reaper.mjs

      - name: Commit verified proxies if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/data/verified-proxies.json scripts/proxy-sources.json
          git diff --cached --quiet || git commit -m "chore(proxy): update verified proxies [skip ci]"
          git push
