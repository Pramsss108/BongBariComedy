name: Site Auto-Heal Watchdog

# Runs every 5 minutes. Verifies that the live site's index.html
# references assets that actually return 200 with a JS/CSS content type,
# AND that the backend API responds. If anything is broken, it triggers
# the Deploy workflow which rebuilds from latest main and republishes.
#
# Manual run is allowed via the "Run workflow" button.

on:
  schedule:
    # Every 5 minutes, 24/7
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write          # needed to push the empty heal commit
  actions: write           # needed to dispatch the deploy workflow
  issues: write            # needed to open an issue when something heals

concurrency:
  group: site-autoheal
  cancel-in-progress: false

jobs:
  check-and-heal:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (needed to push heal commit)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          persist-credentials: true

      - name: Probe live site
        id: probe
        shell: bash
        run: |
          set +e
          SITE="https://www.bongbari.com"
          UA="BongBari-Autoheal/1.0 (+github-actions)"

          echo "::group::Fetching index.html"
          # cache-bust to bypass any CDN caching
          INDEX_URL="$SITE/?_cb=$(date +%s)"
          INDEX_HTTP=$(curl -sS -A "$UA" -o /tmp/index.html -w "%{http_code}" "$INDEX_URL")
          echo "index.html HTTP=$INDEX_HTTP"
          echo "::endgroup::"

          BROKEN_DETAILS=""
          FRONTEND_BROKEN="false"
          if [ "$INDEX_HTTP" != "200" ]; then
            BROKEN_DETAILS="index.html returned HTTP $INDEX_HTTP"
            FRONTEND_BROKEN="true"
          else
            # Extract every /assets/<hash>.{js,css,mjs} reference
            ASSETS=$(grep -oE '/assets/[A-Za-z0-9_.\-]+\.(js|css|mjs)' /tmp/index.html | sort -u)
            if [ -z "$ASSETS" ]; then
              BROKEN_DETAILS="index.html contains no /assets/ references — build template likely broken"
              FRONTEND_BROKEN="true"
            else
              echo "::group::Verifying $(echo "$ASSETS" | wc -l) referenced assets"
              while IFS= read -r path; do
                URL="$SITE$path"
                # GET (not HEAD) because GH Pages 404s sometimes only show via body
                read CODE CTYPE BYTES < <(curl -sS -A "$UA" -o /tmp/asset.bin \
                  -w "%{http_code} %{content_type} %{size_download}" "$URL")
                STATUS="OK"
                if [ "$CODE" != "200" ]; then STATUS="BAD_STATUS"; fi
                if echo "$CTYPE" | grep -qi 'text/html'; then STATUS="HTML_FALLBACK"; fi
                printf '  %-14s %s -> http=%s ctype=%s bytes=%s\n' "$STATUS" "$path" "$CODE" "$CTYPE" "$BYTES"
                if [ "$STATUS" != "OK" ]; then
                  BROKEN_DETAILS="${BROKEN_DETAILS}${BROKEN_DETAILS:+\n}$path -> http=$CODE ctype=$CTYPE status=$STATUS"
                  FRONTEND_BROKEN="true"
                fi
              done <<< "$ASSETS"
              echo "::endgroup::"
            fi
          fi

          echo "::group::Backend API probe"
          API_HTTP=$(curl -sS -A "$UA" --max-time 15 -o /tmp/api.json \
            -w "%{http_code}" "https://api.bongbari.com/api/version?_cb=$(date +%s)" || echo "000")
          echo "api/version HTTP=$API_HTTP"
          BACKEND_BROKEN="false"
          if [ "$API_HTTP" != "200" ]; then
            BROKEN_DETAILS="${BROKEN_DETAILS}${BROKEN_DETAILS:+\n}backend api/version -> http=$API_HTTP (frontend redeploy will NOT fix this; check Hetzner PM2)"
            BACKEND_BROKEN="true"
          fi
          echo "::endgroup::"

          echo "frontend_broken=$FRONTEND_BROKEN" >> "$GITHUB_OUTPUT"
          echo "backend_broken=$BACKEND_BROKEN"  >> "$GITHUB_OUTPUT"

          if [ "$FRONTEND_BROKEN" = "true" ] || [ "$BACKEND_BROKEN" = "true" ]; then
            echo "::error::Site has issues — alert (and heal frontend if applicable)"
            echo "broken=true" >> "$GITHUB_OUTPUT"
            {
              echo 'details<<EOF'
              printf '%b' "$BROKEN_DETAILS"
              echo
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "Site healthy. No heal needed."
            echo "broken=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger deploy workflow (heal frontend)
        if: steps.probe.outputs.frontend_broken == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # deploy.yml's "decide" step skips unless the head commit message
          # contains FORCE_PAGES_DEPLOY. workflow_dispatch alone is therefore
          # a no-op. Push an empty commit with FORCE_PAGES_DEPLOY so the next
          # deploy.yml run is guaranteed to rebuild + republish.
          git config user.name  "bongbari-autoheal[bot]"
          git config user.email "autoheal@users.noreply.github.com"
          # Make sure we have full history & latest main
          git fetch origin main --depth=2
          git checkout main
          git pull --ff-only origin main || true
          MSG="chore(autoheal): force Pages republish $(date -u +%FT%TZ) FORCE_PAGES_DEPLOY"
          git commit --allow-empty -m "$MSG"
          git push origin main
          echo "Pushed empty FORCE_PAGES_DEPLOY commit at $(date -u +%FT%TZ)."

      - name: Open / update tracking issue
        if: steps.probe.outputs.broken == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TITLE="Auto-heal triggered: white-screen / missing bundles detected"
          BODY=$(cat <<EOF
          The watchdog (site-autoheal.yml) detected that **www.bongbari.com** is serving an \`index.html\` whose referenced \`/assets/*.js\` or \`/assets/*.css\` returned a non-200 response (or HTML fallback).

          A redeploy via \`deploy.yml\` has been dispatched automatically.

          ### Probe details
          \`\`\`
          ${{ steps.probe.outputs.details }}
          \`\`\`

          Detected at: \`$(date -u +%FT%TZ)\`
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          # Try to find an open auto-heal issue and append a comment, else create one (label optional)
          NUM=$(gh issue list --repo "$REPO" --state open --search "Auto-heal triggered in:title" --limit 1 --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$NUM" ] && [ "$NUM" != "null" ]; then
            gh issue comment "$NUM" --repo "$REPO" --body "$BODY" || true
          else
            gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY" || true
          fi

      - name: Done
        run: |
          if [ "${{ steps.probe.outputs.broken }}" = "true" ]; then
            echo "Heal dispatched. Next watchdog run will verify recovery."
          else
            echo "Site is healthy."
          fi
