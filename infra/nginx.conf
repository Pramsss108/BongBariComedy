##############################################################
# BongBari — Nginx Reverse Proxy Config
# Target: Hetzner VPS  (Ubuntu 22.04)
# Backend: Node.js on 127.0.0.1:5000
# Domain example: api.bongbari.com
#
# SETUP:
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo nano /etc/nginx/sites-available/bongbari
#   sudo ln -s /etc/nginx/sites-available/bongbari /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d api.bongbari.com
#   sudo nginx -t && sudo systemctl reload nginx
##############################################################

# ── Rate limit zones (declared at http level) ──────────────
# In your /etc/nginx/nginx.conf http{} block, add:
#   limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
#   limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;
#   proxy_cache_path /var/cache/nginx/bongbari levels=1:2
#       keys_zone=bongbari_cache:10m max_size=200m inactive=60s;

##############################################################
# Redirect bare HTTP → HTTPS
##############################################################
server {
    listen 80;
    server_name api.bongbari.com;
    return 301 https://$host$request_uri;
}

##############################################################
# Main HTTPS server block
##############################################################
server {
    listen 443 ssl http2;
    server_name api.bongbari.com;

    # ── SSL (managed by Certbot) ────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.bongbari.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bongbari.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Gzip compression ────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1024;

    # ── Static asset offloading (React build) ───────────────
    # Point this at your dist/public if you serve frontend from VPS
    # If you use GitHub Pages for frontend, remove this block
    location /assets/ {
        alias /var/www/bongbari/dist/public/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── /api/share/upload — large file upload endpoint ──────
    # No micro-cache, longer timeout, stricter rate limit
    location /api/share/upload {
        limit_req zone=upload burst=3 nodelay;
        client_max_body_size 10g;
        client_body_timeout  600s;
        proxy_read_timeout   660s;
        proxy_send_timeout   660s;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;   # stream directly, no RAM buffer

        # CORS headers
        add_header Access-Control-Allow-Origin  "https://www.bongbari.com" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-CSRF-Token" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── Micro-cache: /api/share/gofile-health ───────────────
    # 100 users asking "is GoFile up?" → 1 real fetch per 10s
    location /api/share/gofile-health {
        proxy_cache            bongbari_cache;
        proxy_cache_valid      200 10s;
        proxy_cache_use_stale  error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin "https://www.bongbari.com" always;
    }

    # ── Micro-cache: read-only admin stats ──────────────────
    # Proxy pool counts, hunt stats — cache 5s to avoid DB hammering
    location ~ ^/api/admin/(proxy-status|stats|source-health)$ {
        limit_req zone=api burst=10;
        proxy_cache            bongbari_cache;
        proxy_cache_valid      200 5s;
        proxy_cache_use_stale  error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin "https://www.bongbari.com" always;
    }

    # ── All other /api/* routes ──────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # CORS (backend also sets this; double-header insurance)
        add_header Access-Control-Allow-Origin  "https://www.bongbari.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-CSRF-Token" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── Health check (no auth, no cache) ────────────────────
    location /health {
        access_log off;
        proxy_pass http://127.0.0.1:5000/api/version;
    }

    # ── Block direct access to non-API paths ────────────────
    location / {
        return 404 "Not Found";
    }
}
