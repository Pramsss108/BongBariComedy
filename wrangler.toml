name = "bongbari-extractor"
main = "workers/extractor-worker.js"
compatibility_date = "2024-09-23"
# Workers free tier: 100K req/day, 10ms CPU/request

# ── D1 Database binding ──────────────────────────────────────────
# Run once to create:
#   npx wrangler d1 create bongbari-extractor
# Then copy the database_id here, then run:
#   npx wrangler d1 execute bongbari-extractor --file workers/schema.sql
# Then deploy:
#   npx wrangler deploy
[[d1_databases]]
binding = "DB"
database_name = "bongbari-extractor"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# ── Routes ───────────────────────────────────────────────────────
# After deploying you will get a workers.dev URL like:
# https://bongbari-extractor.<your-subdomain>.workers.dev
# Set VITE_EXTRACTOR_CF_URL in client/.env to that URL.

[vars]
ALLOWED_ORIGIN = "https://www.bongbari.com"
